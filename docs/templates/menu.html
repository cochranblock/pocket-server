<!--
  Pocket POS — default menu template (Unlicense / public domain).
  cochranblock.org

  Drop this into your site_dir as `index.html`. Edit the MENU array below to match
  your offerings. The page POSTs to /api/order on the same host, which is exactly
  what your pocket-server expects. No build step. No JS framework. ~200 lines, no deps.

  Theming: edit the CSS variables at the top of the <style> block.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Order Menu</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --text: #f0f0f0;
  --muted: #888;
  --accent: #00d4aa;
  --accent-dark: #009f7f;
  --danger: #ff4444;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
body { padding: 1rem; padding-bottom: 8rem; max-width: 600px; margin: 0 auto; }

header { padding: 1.5rem 0 1rem; text-align: center; border-bottom: 1px solid #222; margin-bottom: 1rem; }
header h1 { font-size: 1.8rem; color: var(--accent); letter-spacing: -0.02em; }
header p { color: var(--muted); margin-top: 0.25rem; font-size: 0.9rem; }

.menu { display: flex; flex-direction: column; gap: 0.75rem; }
.item {
  background: var(--card); border-radius: var(--radius); padding: 1rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  transition: transform 0.05s, background 0.1s;
}
.item:active { transform: scale(0.98); background: #1a1a1a; }
.item .info { flex: 1; min-width: 0; }
.item .name { font-weight: 600; font-size: 1.05rem; }
.item .desc { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; line-height: 1.4; }
.item .price { font-weight: 700; color: var(--accent); font-size: 1.1rem; white-space: nowrap; }
.item .add { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0.5rem 0.9rem; font-weight: 600; font-size: 0.95rem; cursor: pointer; min-width: 44px; }
.item .add:active { background: var(--accent-dark); }

.cart {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-top: 2px solid var(--accent);
  padding: 1rem; padding-bottom: max(1rem, env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.2s ease;
  z-index: 10;
}
.cart.has-items { transform: translateY(0); }
.cart .summary { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.cart .totals { flex: 1; min-width: 0; }
.cart .totals .label { color: var(--muted); font-size: 0.8rem; }
.cart .totals .total { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
.cart .place {
  background: var(--accent); color: #000; border: none; border-radius: var(--radius);
  padding: 0.9rem 1.5rem; font-weight: 700; font-size: 1.1rem; cursor: pointer; min-height: 56px;
}
.cart .place:active { background: var(--accent-dark); }
.cart .place:disabled { opacity: 0.5; cursor: not-allowed; }
.cart .lines { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
.cart.expanded .lines { max-height: 40vh; overflow-y: auto; margin-bottom: 0.75rem; }
.cart .line { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #1a1a1a; font-size: 0.95rem; }
.cart .line button { background: none; border: none; color: var(--danger); cursor: pointer; padding: 0 0.5rem; font-size: 1.2rem; }
.cart .toggle { background: none; border: none; color: var(--muted); font-size: 0.8rem; padding: 0.4rem 0; cursor: pointer; width: 100%; text-align: center; }

.toast {
  position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 2px solid var(--accent); border-radius: var(--radius);
  padding: 1rem 1.5rem; max-width: 90vw; z-index: 20;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.toast.show { opacity: 1; }
.toast.error { border-color: var(--danger); }

footer { text-align: center; color: var(--muted); font-size: 0.7rem; padding: 2rem 0 1rem; }
footer a { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1 id="site-name">Mike's Tacos</h1>
  <p>Tap an item to add. Place order when ready.</p>
</header>

<div class="menu" id="menu"></div>

<div class="cart" id="cart">
  <button class="toggle" id="toggle">Show items</button>
  <div class="lines" id="lines"></div>
  <div class="summary">
    <div class="totals">
      <div class="label">Total · <span id="count">0</span> item<span id="plural">s</span></div>
      <div class="total" id="total">$0.00</div>
    </div>
    <button class="place" id="place">Place Order</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  Powered by <a href="https://cochranblock.org">Pocket POS</a> — public domain
</footer>

<script>
// ============================================================================
// EDIT BELOW: your menu items. price is in CENTS (e.g., 1250 = $12.50).
// ============================================================================
const MENU = [
  { id: 'taco-al-pastor',   name: 'Al Pastor Taco',     desc: 'Pork shoulder, pineapple, cilantro, onion', price: 450 },
  { id: 'taco-carnitas',    name: 'Carnitas Taco',      desc: 'Slow-braised pork, salsa verde',           price: 425 },
  { id: 'taco-veg',         name: 'Mushroom Taco',      desc: 'Roasted mushrooms, salsa roja, queso',     price: 425 },
  { id: 'burrito',          name: 'House Burrito',      desc: 'Rice, beans, your choice of meat',         price: 1100 },
  { id: 'quesadilla',       name: 'Quesadilla',         desc: 'Oaxaca cheese, flour tortilla',            price: 850 },
  { id: 'horchata',         name: 'Horchata',           desc: 'Cinnamon-rice agua fresca, 16 oz',         price: 400 },
  { id: 'jarritos',         name: 'Jarritos',           desc: 'Mexican soda — flavor of the day',         price: 350 },
  { id: 'chips-salsa',      name: 'Chips & Salsa',      desc: 'House salsa, salsa verde',                 price: 500 },
];
// ============================================================================

const cart = new Map(); // id -> {item, qty}
const $ = (id) => document.getElementById(id);
const fmt = (cents) => '$' + (cents / 100).toFixed(2);

function render() {
  const menu = $('menu');
  menu.innerHTML = '';
  for (const item of MENU) {
    const row = document.createElement('div');
    row.className = 'item';
    row.innerHTML = `
      <div class="info">
        <div class="name">${escapeHtml(item.name)}</div>
        <div class="desc">${escapeHtml(item.desc)}</div>
      </div>
      <div class="price">${fmt(item.price)}</div>
      <button class="add" type="button">+</button>
    `;
    row.addEventListener('click', () => addItem(item));
    menu.appendChild(row);
  }
  renderCart();
}

function addItem(item) {
  const cur = cart.get(item.id);
  cart.set(item.id, { item, qty: (cur ? cur.qty : 0) + 1 });
  renderCart();
}

function removeItem(id) {
  const cur = cart.get(id);
  if (!cur) return;
  if (cur.qty <= 1) cart.delete(id);
  else cart.set(id, { ...cur, qty: cur.qty - 1 });
  renderCart();
}

function renderCart() {
  const lines = $('lines');
  lines.innerHTML = '';
  let total = 0;
  let count = 0;
  for (const [id, { item, qty }] of cart) {
    total += item.price * qty;
    count += qty;
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = `
      <span>${qty} × ${escapeHtml(item.name)}</span>
      <span>
        ${fmt(item.price * qty)}
        <button type="button" data-id="${id}">×</button>
      </span>
    `;
    line.querySelector('button').addEventListener('click', (e) => {
      e.stopPropagation();
      removeItem(id);
    });
    lines.appendChild(line);
  }
  $('total').textContent = fmt(total);
  $('count').textContent = count;
  $('plural').textContent = count === 1 ? '' : 's';
  $('place').disabled = count === 0;
  $('cart').classList.toggle('has-items', count > 0);
}

function describe() {
  const parts = [];
  for (const [_, { item, qty }] of cart) {
    parts.push(`${qty}x ${item.name}`);
  }
  return parts.join(', ');
}

function totalCents() {
  let t = 0;
  for (const [_, { item, qty }] of cart) t += item.price * qty;
  return t;
}

function showToast(message, isError) {
  const t = $('toast');
  t.textContent = message;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

async function placeOrder() {
  const amount = totalCents();
  if (amount === 0) return;
  const desc = describe();
  $('place').disabled = true;
  try {
    const params = new URLSearchParams({
      amount_cents: String(amount),
      description: desc,
    });
    const r = await fetch(`/api/order?${params}`, { method: 'POST' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    showToast(`Order #${data.id} placed — ${fmt(amount)}. Pay at the counter.`);
    cart.clear();
    renderCart();
  } catch (e) {
    showToast(`Could not place order: ${e.message}`, true);
    $('place').disabled = false;
  }
}

$('place').addEventListener('click', placeOrder);
$('toggle').addEventListener('click', () => $('cart').classList.toggle('expanded'));

render();
</script>

</body>
</html>
